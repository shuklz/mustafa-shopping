<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Kitchen shopping checklist — tick items from your master list and share instantly to WhatsApp.">
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kitchen List">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Kitchen List</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
  :root {
    --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    --accent-h: 161; --accent-s: 84%; --accent-l: 48%;
    --accent: hsl(var(--accent-h), var(--accent-s), var(--accent-l));
    --accent-glow: hsla(var(--accent-h), var(--accent-s), var(--accent-l), 0.3);
    --whatsapp-green: #25d366;
    --whatsapp-green-hover: #128c7e;

    --radius-sm: 8px; --radius-md: 14px; --radius-lg: 22px; --radius-round: 50%;
    --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

    /* DEFAULT DARK MODE */
    --bg-app: #0b0f19;
    --bg-gradient: linear-gradient(180deg, #0b0f19 0%, #0f172a 100%);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --glass-bg: rgba(15, 23, 42, 0.7);
    --glass-border: rgba(255, 255, 255, 0.05);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    --card-bg: rgba(30, 41, 59, 0.3);
    --card-border: rgba(255, 255, 255, 0.03);
    --item-selected-bg: rgba(16, 185, 129, 0.12);
    --item-selected-border: rgba(16, 185, 129, 0.35);
    --item-selected-glow: rgba(16, 185, 129, 0.1);
    --field-bg: rgba(255, 255, 255, 0.04);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.12);
  }
  body.light-mode {
    --bg-app: #f8fafc;
    --bg-gradient: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #cbd5e1;
    --glass-bg: rgba(255, 255, 255, 0.78);
    --glass-border: rgba(15, 23, 42, 0.06);
    --glass-shadow: 0 8px 32px 0 rgba(148, 163, 184, 0.12);
    --card-bg: rgba(255, 255, 255, 0.6);
    --card-border: rgba(15, 23, 42, 0.04);
    --item-selected-bg: rgba(16, 185, 129, 0.08);
    --item-selected-border: rgba(16, 185, 129, 0.4);
    --item-selected-glow: rgba(16, 185, 129, 0.05);
    --field-bg: rgba(15, 23, 42, 0.03);
    --shadow-sm: 0 2px 8px rgba(148, 163, 184, 0.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; font-family: var(--font-body); background-color: var(--bg-app); color: var(--text-primary); overflow: hidden; font-size: 16px; line-height: 1.5; }
  body { background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; }

  .app-container { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,.35); border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); }
  @media (min-width: 481px) { .app-container { height: 94vh; border-radius: var(--radius-lg); border: 1px solid var(--glass-border); } }

  h1, h3 { font-family: var(--font-display); font-weight: 700; }
  .glass { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

  /* Header */
  .app-header { padding: calc(0.9rem + env(safe-area-inset-top)) 1.2rem 0.8rem; background: linear-gradient(to bottom, var(--bg-app) 75%, transparent 100%); z-index: 10; flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .logo-area { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; }
  .logo-area:active { transform: scale(0.98); }
  .logo-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--accent) 0%, #14b8a6 100%); color: #fff; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 12px var(--accent-glow); font-size: 18px; }
  .logo-text-wrapper { display: flex; flex-direction: column; }
  .logo-text-wrapper h1 { font-size: 1.3rem; letter-spacing: -0.5px; line-height: 1.1; background: linear-gradient(to right, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-subtitle { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary); opacity: 0.85; }
  .header-actions { display: flex; gap: 0.5rem; }
  .icon-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-secondary); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: var(--transition-fast); font-size: 16px; }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.danger:hover { color: #ef4444; border-color: rgba(239,68,68,.2); background: rgba(239,68,68,.05); }
  #theme-toggle .moon { display: inline; } #theme-toggle .sun { display: none; }
  body.light-mode #theme-toggle .moon { display: none; } body.light-mode #theme-toggle .sun { display: inline; }
  #sound-toggle .on { display: inline; } #sound-toggle .off { display: none; }
  body.sound-off #sound-toggle .on { display: none; } body.sound-off #sound-toggle .off { display: inline; }

  /* Search + filters */
  .filter-section { padding: 0.4rem 1.2rem; display: flex; flex-direction: column; gap: 0.6rem; flex-shrink: 0; z-index: 5; }
  .search-box { display: flex; align-items: center; padding: 0 0.8rem; height: 40px; border-radius: var(--radius-md); position: relative; }
  .search-icon { margin-right: 0.5rem; opacity: .6; flex-shrink: 0; }
  .search-box input { flex-grow: 1; background: transparent; border: none; color: var(--text-primary); font-family: var(--font-body); font-size: 16px; outline: none; height: 100%; }
  .search-box input::placeholder { color: var(--text-secondary); opacity: 0.6; }
  .clear-input-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 1.1rem; cursor: pointer; padding: 0 0.2rem; }
  .clear-input-btn.hidden { display: none; }
  .category-filters-container { overflow-x: auto; scrollbar-width: none; }
  .category-filters-container::-webkit-scrollbar { display: none; }
  .category-filters { display: flex; gap: 0.4rem; padding: 0.1rem 0; }
  .filter-pill { padding: 0.35rem 0.8rem; border-radius: 12px; font-size: 0.72rem; font-weight: 600; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-secondary); cursor: pointer; transition: var(--transition-fast); white-space: nowrap; }
  .filter-pill.active { background: var(--text-primary); color: var(--bg-app); border-color: var(--text-primary); }

  /* List */
  .list-scroll-area { flex-grow: 1; overflow-y: auto; padding: 0.5rem 1.2rem 8rem; scroll-behavior: smooth; position: relative; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 1.5rem; color: var(--text-secondary); }
  .empty-state.hidden { display: none; }
  .empty-illustration { font-size: 3rem; margin-bottom: 0.8rem; opacity: 0.6; animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .empty-state h3 { font-size: 1.05rem; margin-bottom: 0.3rem; color: var(--text-primary); }
  .empty-state p { font-size: 0.82rem; max-width: 250px; opacity: 0.75; }

  .category-group { margin-bottom: 1rem; }
  .category-group.hidden { display: none; }
  .category-header { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.2rem; margin-bottom: 0.4rem; }
  .category-title-wrapper { display: flex; align-items: center; gap: 0.4rem; }
  .category-badge-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
  .category-title { font-family: var(--font-display); font-weight: 600; font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase; }
  .category-count { font-size: 0.72rem; color: var(--text-secondary); opacity: 0.7; font-weight: 600; }
  .category-items-container { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }

  .item-card { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-md); padding: 0.7rem 0.9rem; cursor: pointer; user-select: none; box-shadow: var(--shadow-sm); transition: all var(--transition-normal), transform var(--transition-bounce); animation: itemEntrance 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes itemEntrance { from { opacity: 0; transform: translateY(10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .item-card:hover { border-color: var(--glass-border); }
  .item-left { display: flex; align-items: center; gap: 0.7rem; min-width: 0; flex: 1; }
  .checkbox-btn { width: 20px; height: 20px; border-radius: var(--radius-round); border: 2px solid var(--text-secondary); background: transparent; display: flex; justify-content: center; align-items: center; flex-shrink: 0; transition: all var(--transition-bounce); color: transparent; font-size: 12px; font-weight: 700; }
  .item-card:hover .checkbox-btn { border-color: var(--accent); }
  .item-title { font-weight: 550; font-size: 0.92rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: var(--transition-fast); }
  .item-card.checked { background: var(--item-selected-bg); border-color: var(--item-selected-border); box-shadow: 0 4px 12px var(--item-selected-glow); }
  .item-card.checked .checkbox-btn { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.08); }
  .item-card.checked .item-title { font-weight: 700; color: var(--accent); }

  /* Qty field (carried over from your original site) */
  .qty { display: none; width: 88px; flex: none; text-align: right; font-size: 16px; font-weight: 600; color: var(--accent); background: var(--field-bg); border: 1px solid var(--item-selected-border); border-radius: var(--radius-sm); padding: 6px 8px; outline: none; font-family: var(--font-body); }
  .item-card.checked .qty { display: block; }
  .qty::placeholder { color: var(--text-secondary); opacity: .7; font-weight: 500; }

  /* Other items (carried over) */
  .other-add { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .other-add input { flex: 1; min-width: 0; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-md); padding: 0.7rem 0.9rem; color: var(--text-primary); font-family: var(--font-body); font-size: 16px; outline: none; }
  .other-add input:focus { border-color: var(--item-selected-border); }
  .other-add button { width: 44px; border: none; background: var(--accent); color: #fff; border-radius: var(--radius-md); font-size: 1.3rem; cursor: pointer; flex: none; transition: var(--transition-fast); }
  .other-add button:active { transform: scale(0.94); }
  .ex-del { border: none; background: transparent; color: #ef4444; font-size: 1rem; cursor: pointer; padding: 4px 6px; flex: none; }

  /* Bottom action bar */
  .app-bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); background: linear-gradient(to top, var(--bg-app) 78%, transparent 100%); z-index: 15; }
  /* On a filtered category tab, hide the share bar and reclaim the space */
  .app-container.hide-actions .app-bottom-nav { display: none; }
  .app-container.hide-actions .list-scroll-area { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
  .bottom-action-panel { display: flex; flex-direction: column; gap: 0.6rem; padding: 0.8rem 1.2rem; margin: 0.2rem 0.8rem 0.6rem; border-radius: var(--radius-lg); }
  .selected-summary { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); cursor: pointer; transition: var(--transition-fast); }
  .selected-summary:active { transform: scale(0.98); }
  .selected-summary.reviewing { color: var(--accent); }
  .selected-count { background: var(--accent); color: #fff; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.65rem; box-shadow: 0 2px 6px var(--accent-glow); }
  .button-action-group { display: flex; gap: 0.6rem; width: 100%; }
  .btn { height: 44px; border-radius: var(--radius-md); border: none; font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: var(--transition-fast); display: inline-flex; justify-content: center; align-items: center; gap: 0.4rem; padding: 0 1rem; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .btn-secondary { background: var(--field-bg); color: var(--text-primary); border: 1px solid var(--glass-border); }
  .button-action-group .btn-secondary { flex: 1; }
  .button-action-group .btn-primary { flex: 1.7; }
  .btn-primary { background: var(--whatsapp-green); color: #fff; flex-grow: 1; box-shadow: 0 4px 14px rgba(37,211,102,.35); }
  .btn-primary:hover:not(:disabled) { background: var(--whatsapp-green-hover); }
  .btn-accent { background: var(--accent); color: #fff; margin-top: 1.2rem; box-shadow: 0 4px 14px var(--accent-glow); }

  .loading-spinner { width: 28px; height: 28px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toasts */
  .toast-container { position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%); z-index: 1000; width: 88%; max-width: 360px; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
  .toast { padding: 0.7rem 1.1rem; border-radius: var(--radius-md); font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,.3); animation: toastEntrance 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards; transition: all 0.3s ease; }
  @keyframes toastEntrance { from { opacity: 0; transform: translateY(-16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .toast.success { background: #064e3b; border: 1px solid #059669; color: #a7f3d0; }
  body.light-mode .toast.success { background: #ecfdf5; border: 1px solid #10b981; color: #065f46; }
  .toast.info { background: #1e293b; border: 1px solid #334155; color: #f1f5f9; }
  body.light-mode .toast.info { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; }
  .toast-text { flex: 1; }
  .toast-action { margin-left: 0.6rem; background: transparent; border: none; color: var(--accent); font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; cursor: pointer; padding: 2px 4px; flex: none; }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-top">
        <div class="logo-area" id="logo-home" role="button" tabindex="0" title="Show all items">
          <div class="logo-icon">🛒</div>
          <div class="logo-text-wrapper">
            <h1>Kitchen List</h1>
            <p class="logo-subtitle" id="logo-subtitle">Master Shopping List</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="clear-all-btn" class="icon-btn danger" aria-label="Clear all" title="Clear all">🗑️</button>
          <button id="sound-toggle" class="icon-btn" aria-label="Toggle tick sound" title="Toggle tick sound"><span class="on">🔊</span><span class="off">🔇</span></button>
          <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme"><span class="moon">🌙</span><span class="sun">☀️</span></button>
        </div>
      </div>
    </header>

    <section class="filter-section">
      <div class="search-box glass">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search items…" autocomplete="off">
        <button id="search-clear-btn" class="clear-input-btn hidden">&times;</button>
      </div>
      <div class="category-filters-container">
        <div id="category-filters" class="category-filters">
          <button class="filter-pill active" data-category="all">All Items</button>
        </div>
      </div>
    </section>

    <main class="list-scroll-area" id="list-scroll-area">
      <div id="loading-state" class="empty-state">
        <div class="loading-spinner"></div>
        <p>Loading master list…</p>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-illustration">🛍️</div>
        <h3>No matching items</h3>
        <p>Nothing matches your search.</p>
        <button id="add-as-other-btn" class="btn btn-accent" style="display:none">＋ Add as other item</button>
      </div>
      <div id="shopping-list-groups" class="hidden"></div>
    </main>

    <nav class="app-bottom-nav">
      <div class="bottom-action-panel glass">
        <div class="selected-summary" id="selected-summary" role="button" tabindex="0" title="Review the selected items">
          <span class="selected-count" id="selected-count-label">0</span>
          <span id="selected-summary-text">items selected</span>
        </div>
        <div class="button-action-group">
          <button id="share-btn" class="btn btn-secondary" title="Share to apps (Notes, Messages…)">📤 Share</button>
          <button id="whatsapp-share-btn" class="btn btn-primary" disabled>💬 Share to WhatsApp</button>
        </div>
      </div>
    </nav>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
  (function () {
    // ── To send straight to your WhatsApp, put your number here (country code + number, digits only).
    //    Example for Singapore: "6591234567". Leave "" and you'll pick the chat after tapping Share.
    var OWNER_WHATSAPP = "";

    var EMOJI_COLORS = {
      "🥦": "#10b981", "🍎": "#ef4444", "🌾": "#f59e0b", "🥖": "#b45309", "🥜": "#d97706",
      "🧂": "#64748b", "🍯": "#fbbf24", "☕": "#8b5cf6", "🍘": "#ec4899", "📋": "#3b82f6"
    };

    var state = { catalog: [], theme: "dark", sound: "on", extras: [], eseq: 0 };
    var currentSearch = "", currentFilter = "all", selectedOnly = false;

    function el(id) { return document.getElementById(id); }
    function esc(s) { return String(s).replace(/[&<>"']/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[m]; }); }

    // ── Theme ──
    function applyTheme() {
      document.body.classList.toggle("light-mode", state.theme === "light");
      try { localStorage.setItem("kitchenlist_theme", state.theme); } catch (e) {}
    }
    (function initTheme() {
      var saved; try { saved = localStorage.getItem("kitchenlist_theme"); } catch (e) {}
      state.theme = saved || "dark";
      applyTheme();
    })();

    // ── Tick sound ──
    // Synthesised with the Web Audio API (no audio file to fetch — keeps us single-file).
    // The AudioContext can't start until the user has interacted, so it's created lazily
    // on the first tick and resumed if the browser suspended it.
    var audioCtx = null;
    function applySound() {
      document.body.classList.toggle("sound-off", state.sound !== "on");
      try { localStorage.setItem("kitchenlist_sound", state.sound); } catch (e) {}
    }
    (function initSound() {
      var saved; try { saved = localStorage.getItem("kitchenlist_sound"); } catch (e) {}
      state.sound = saved || "on";
      applySound();
    })();
    function playTick() {
      if (state.sound !== "on") return;
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        if (!audioCtx) audioCtx = new AC();
        if (audioCtx.state === "suspended") audioCtx.resume();
        var t = audioCtx.currentTime;
        var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = "triangle";
        osc.frequency.setValueAtTime(880, t);
        osc.frequency.exponentialRampToValueAtTime(1320, t + 0.04);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
        osc.start(t); osc.stop(t + 0.08);
      } catch (e) { /* audio not available — silent */ }
    }

    // ── Persistence: auto-save the in-progress list to this phone ──
    // Keyed by category + item NAME (not position) so editing master-list.txt
    // never corrupts a saved list.
    var STORAGE_KEY = "kitchenlist_state_v1";
    function itemKey(catName, itemName) { return catName + "" + itemName; }

    function saveState() {
      try {
        var data = { items: {}, extras: [] };
        state.catalog.forEach(function (cat) {
          cat.items.forEach(function (it) {
            if (it.checked) data.items[itemKey(cat.name, it.name)] = it.qty || "";
          });
        });
        data.extras = state.extras.map(function (ex) { return { name: ex.name, qty: ex.qty || "" }; });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {}
    }

    function loadSavedInto() {
      var raw; try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { return; }
      if (!raw) return;
      var data; try { data = JSON.parse(raw); } catch (e) { return; }
      if (!data) return;
      if (data.items) {
        state.catalog.forEach(function (cat) {
          cat.items.forEach(function (it) {
            var q = data.items[itemKey(cat.name, it.name)];
            if (q !== undefined) { it.checked = true; it.qty = q || ""; }
          });
        });
      }
      if (Array.isArray(data.extras)) {
        state.extras = data.extras.map(function (ex) { return { id: "e" + (state.eseq++), name: ex.name, qty: ex.qty || "" }; });
      }
    }

    // Snapshot/restore used by Clear's Undo.
    function snapshotState() {
      var snap = { items: {}, extras: [] };
      state.catalog.forEach(function (cat) {
        cat.items.forEach(function (it) {
          if (it.checked) snap.items[itemKey(cat.name, it.name)] = it.qty || "";
        });
      });
      snap.extras = state.extras.map(function (ex) { return { name: ex.name, qty: ex.qty || "" }; });
      return snap;
    }
    function restoreSnapshot(snap) {
      state.catalog.forEach(function (cat) {
        cat.items.forEach(function (it) {
          var q = snap.items[itemKey(cat.name, it.name)];
          if (q !== undefined) { it.checked = true; it.qty = q; }
          else { it.checked = false; it.qty = ""; }
        });
      });
      state.extras = snap.extras.map(function (ex) { return { id: "e" + (state.eseq++), name: ex.name, qty: ex.qty || "" }; });
    }

    // ── Load & parse master-list.txt ──
    fetch("master-list.txt?t=" + Date.now(), { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(function (text) { parseCatalog(text); loadSavedInto(); el("loading-state").classList.add("hidden"); el("shopping-list-groups").classList.remove("hidden"); render(); })
      .catch(function (e) {
        el("loading-state").innerHTML =
          '<div style="font-size:32px;margin-bottom:8px">⚠️</div>' +
          'Could not load the shopping list.<br>Check your connection and refresh.' +
          '<br><br><small style="opacity:.6">' + esc(e.message) + "</small>";
      });

    function parseCatalog(text) {
      var lines = text.split(/\r?\n/);
      state.catalog = [];
      var cur = null, ci = 0;
      lines.forEach(function (line) {
        var t = line.trim();
        if (!t) return;
        var first = Array.from(t)[0];
        var isCat = /^\p{Extended_Pictographic}/u.test(t);
        if (isCat) {
          cur = { name: t, emoji: first, color: EMOJI_COLORS[first] || "#10b981", items: [], idx: ci++ };
          state.catalog.push(cur);
        } else if (cur) {
          cur.items.push({ id: "c" + cur.idx + "i" + cur.items.length, name: t, checked: false, qty: "" });
        }
      });
    }

    // ── Render ──
    function render() {
      // Share bar lives on "All Items" and in the review view — share from there; other tabs get the space.
      document.querySelector(".app-container").classList.toggle("hide-actions", currentFilter !== "all" && !selectedOnly);
      var sub = el("logo-subtitle");
      if (sub) {
        var totalAll = state.catalog.reduce(function (n, c) { return n + c.items.length; }, 0);
        sub.textContent = totalAll ? "Master Shopping List (" + totalAll + ")" : "Master Shopping List";
      }
      renderPills(); renderGroups(); updateCount();
    }

    // Pills show how many items are *selected* (progress), not the catalog total —
    // the per-category totals already live in each list group header. Count is
    // omitted at 0 so untouched tabs stay clean.
    function catSelected(cat) { return cat.items.filter(function (i) { return i.checked; }).length; }
    function pillLabel(base, n) { return n > 0 ? base + " (" + n + ")" : base; }

    function renderPills() {
      var box = el("category-filters");
      box.querySelectorAll('.filter-pill:not([data-category="all"])').forEach(function (p) { p.remove(); });
      var allPill = box.querySelector('[data-category="all"]');
      allPill.classList.toggle("active", currentFilter === "all");
      allPill.textContent = pillLabel("All Items", totalSelected());
      state.catalog.forEach(function (cat) {
        var b = document.createElement("button");
        b.className = "filter-pill" + (currentFilter === cat.name ? " active" : "");
        b.dataset.category = cat.name;
        b.textContent = pillLabel(cat.name, catSelected(cat));
        box.appendChild(b);
      });
      // ── "Others" tab at the end: a dedicated home for wild items not in any category ──
      var others = document.createElement("button");
      others.className = "filter-pill" + (currentFilter === "__others__" ? " active" : "");
      others.dataset.category = "__others__";
      others.textContent = pillLabel("✏️ Others", state.extras.length);
      box.appendChild(others);
    }

    // Refresh just the pill counts in place (no rebuild → tab scroll position is kept).
    function updatePillCounts() {
      var box = el("category-filters");
      if (!box) return;
      box.querySelectorAll(".filter-pill").forEach(function (p) {
        var cat = p.dataset.category;
        if (cat === "all") p.textContent = pillLabel("All Items", totalSelected());
        else if (cat === "__others__") p.textContent = pillLabel("✏️ Others", state.extras.length);
        else {
          var c = state.catalog.filter(function (x) { return x.name === cat; })[0];
          p.textContent = pillLabel(cat, c ? catSelected(c) : 0);
        }
      });
    }

    function renderGroups() {
      var wrap = el("shopping-list-groups");
      wrap.innerHTML = "";
      var q = currentSearch.trim().toLowerCase();
      var matches = 0;

      state.catalog.forEach(function (cat) {
        var items = cat.items;
        if (q) items = items.filter(function (it) { return it.name.toLowerCase().indexOf(q) !== -1; });
        if (selectedOnly) items = items.filter(function (it) { return it.checked; });
        var catMatch = currentFilter === "all" || currentFilter === cat.name;
        if (!items.length || !catMatch) return;
        matches += items.length;

        var group = document.createElement("div");
        group.className = "category-group";
        group.innerHTML =
          '<div class="category-header"><div class="category-title-wrapper">' +
          '<span class="category-badge-dot" style="background:' + cat.color + ';color:' + cat.color + '"></span>' +
          '<span class="category-title" style="color:' + cat.color + '">' + esc(cat.name) + '</span></div>' +
          '<span class="category-count">' + items.length + ' item' + (items.length === 1 ? "" : "s") + '</span></div>' +
          '<div class="category-items-container"></div>';
        var container = group.querySelector(".category-items-container");

        items.forEach(function (it) {
          var card = document.createElement("div");
          card.className = "item-card" + (it.checked ? " checked" : "");
          card.dataset.id = it.id;
          card.innerHTML =
            '<div class="item-left"><span class="checkbox-btn">✓</span>' +
            '<span class="item-title">' + esc(it.name) + '</span></div>' +
            '<input class="qty" placeholder="qty…" autocomplete="off" value="' + esc(it.qty) + '">';
          var qtyInput = card.querySelector(".qty");
          qtyInput.addEventListener("click", function (e) { e.stopPropagation(); });
          qtyInput.addEventListener("input", function () { it.qty = qtyInput.value; saveState(); });
          card.addEventListener("click", function () { toggleItem(it, card); });
          container.appendChild(card);
        });
        wrap.appendChild(group);
      });

      // ── "Other items" section — lives on All Items and the dedicated "Others" tab
      //    (hidden while searching, and hidden in review view when there are none to show) ──
      var showOthers = currentFilter === "all" || currentFilter === "__others__";
      if (!q && showOthers && !(selectedOnly && state.extras.length === 0)) {
        var og = document.createElement("div");
        og.className = "category-group";
        og.innerHTML =
          '<div class="category-header"><div class="category-title-wrapper">' +
          '<span class="category-badge-dot" style="background:#3b82f6;color:#3b82f6"></span>' +
          '<span class="category-title" style="color:#3b82f6">✏️ Other items</span></div>' +
          '<span class="category-count">' + state.extras.length + ' added</span></div>' +
          '<div class="category-items-container" id="ex-list"></div>' +
          '<div class="other-add"><input id="ex-draft" placeholder="Add something not on the list…" autocomplete="off"><button id="ex-add-btn">+</button></div>';
        wrap.appendChild(og);
        var exList = og.querySelector("#ex-list");
        state.extras.forEach(function (ex) { exList.appendChild(buildExtraCard(ex)); });
        og.querySelector("#ex-add-btn").addEventListener("click", addExtra);
        og.querySelector("#ex-draft").addEventListener("keydown", function (e) { if (e.key === "Enter") addExtra(); });
        // In the review view the add box is just noise — hide it, keep the items.
        if (selectedOnly) og.querySelector(".other-add").style.display = "none";
      }

      el("empty-state").classList.toggle("hidden", matches > 0 || !q);
      var addBtn = el("add-as-other-btn");
      if (matches === 0 && q) {
        addBtn.textContent = '＋ Add "' + currentSearch.trim() + '" as other item';
        addBtn.style.display = "";
      } else {
        addBtn.style.display = "none";
      }
    }

    function buildExtraCard(ex) {
      var card = document.createElement("div");
      card.className = "item-card checked";
      card.innerHTML =
        '<div class="item-left"><span class="checkbox-btn">✓</span>' +
        '<span class="item-title">' + esc(ex.name) + '</span></div>' +
        '<input class="qty" placeholder="qty…" autocomplete="off" value="' + esc(ex.qty) + '">' +
        '<button class="ex-del" title="Remove">✕</button>';
      var qtyInput = card.querySelector(".qty");
      qtyInput.addEventListener("click", function (e) { e.stopPropagation(); });
      qtyInput.addEventListener("input", function () { ex.qty = qtyInput.value; saveState(); });
      card.querySelector(".ex-del").addEventListener("click", function (e) {
        e.stopPropagation();
        state.extras = state.extras.filter(function (x) { return x.id !== ex.id; });
        saveState();
        render();
      });
      return card;
    }

    function addExtraNamed(name) {
      name = (name || "").trim();
      if (!name) return;
      state.extras.push({ id: "e" + (state.eseq++), name: name, qty: "" });
      saveState();
    }
    function addExtra() {
      var inp = el("ex-draft");
      if (!inp || !inp.value.trim()) return;
      addExtraNamed(inp.value);
      render();
      var d = el("ex-draft"); if (d) d.focus();
    }

    function toggleItem(it, card) {
      it.checked = !it.checked;
      if (!it.checked) it.qty = "";
      card.classList.toggle("checked", it.checked);
      if (it.checked) { var qf = card.querySelector(".qty"); if (qf) qf.value = it.qty; }
      if (it.checked) { if (navigator.vibrate) navigator.vibrate(12); playTick(); }
      updateCount();
      saveState();
      // In the review view, an unticked item is no longer part of the list — drop it.
      if (selectedOnly && !it.checked) renderGroups();
    }

    function totalSelected() {
      var n = state.extras.length;
      state.catalog.forEach(function (c) { n += c.items.filter(function (i) { return i.checked; }).length; });
      return n;
    }

    function updateCount() {
      var n = totalSelected();
      el("selected-count-label").textContent = n;
      el("whatsapp-share-btn").disabled = n === 0;
      updatePillCounts();
      var txt = el("selected-summary-text");
      if (txt) txt.textContent = selectedOnly
        ? "selected · tap to show all"
        : (n === 0 ? "items selected" : "selected · tap to review");
      el("selected-summary").classList.toggle("reviewing", selectedOnly);
    }

    // ── Build shareable message ──
    function buildMessage() {
      var now = new Date();
      var d = now.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
      var lines = ["🛒 *Shopping List*", d, ""];
      state.catalog.forEach(function (cat) {
        var picked = cat.items.filter(function (i) { return i.checked; });
        if (!picked.length) return;
        lines.push(cat.name);
        picked.forEach(function (i) { lines.push("• " + i.name + (i.qty.trim() ? " (" + i.qty.trim() + ")" : "")); });
        lines.push("");
      });
      if (state.extras.length) {
        lines.push("✏️ Other items");
        state.extras.forEach(function (ex) { lines.push("• " + ex.name + (ex.qty.trim() ? " (" + ex.qty.trim() + ")" : "")); });
        lines.push("");
      }
      return lines.join("\n").trim();
    }

    // ── Actions ──
    el("whatsapp-share-btn").addEventListener("click", function () {
      if (totalSelected() === 0) { showToast("Tick some items first!", "info"); return; }
      var base = OWNER_WHATSAPP ? "https://wa.me/" + OWNER_WHATSAPP + "?text=" : "https://wa.me/?text=";
      window.open(base + encodeURIComponent(buildMessage()), "_blank");
    });

    // Native share sheet (iOS/Android) — send the list as plain text to Notes, Messages, Mail, etc.
    el("share-btn").addEventListener("click", function () {
      if (totalSelected() === 0) { showToast("Tick some items first!", "info"); return; }
      var text = buildMessage();
      if (navigator.share) {
        navigator.share({ text: text }).catch(function () { /* user cancelled — ignore */ });
      } else {
        // Desktop/unsupported: fall back to clipboard so nothing is lost.
        function done() { showToast("Sharing not supported here — copied instead.", "info"); }
        try { navigator.clipboard.writeText(text).then(done, function () { legacyCopy(text); done(); }); }
        catch (e) { legacyCopy(text); done(); }
      }
    });
    function legacyCopy(text) {
      var ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
      ta.select(); try { document.execCommand("copy"); } catch (e) {} document.body.removeChild(ta);
    }

    el("clear-all-btn").addEventListener("click", function () {
      if (totalSelected() === 0) { showToast("Nothing to clear.", "info"); return; }
      var snapshot = snapshotState();
      state.catalog.forEach(function (c) { c.items.forEach(function (i) { i.checked = false; i.qty = ""; }); });
      state.extras = [];
      saveState();
      render();
      showToast("Cleared the list.", "info", "Undo", function () {
        restoreSnapshot(snapshot);
        saveState();
        render();
        showToast("Restored.", "success");
      });
    });

    el("theme-toggle").addEventListener("click", function () {
      state.theme = state.theme === "dark" ? "light" : "dark";
      applyTheme();
    });

    el("sound-toggle").addEventListener("click", function () {
      state.sound = state.sound === "on" ? "off" : "on";
      applySound();
      if (state.sound === "on") { playTick(); showToast("Tick sound on.", "info"); }
      else showToast("Tick sound off.", "info");
    });

    // ── Logo / heading = "home": jump back to the full All Items list ──
    function goHome() {
      currentFilter = "all"; selectedOnly = false;
      el("search-input").value = ""; currentSearch = "";
      el("search-clear-btn").classList.add("hidden");
      render();
      el("list-scroll-area").scrollTop = 0;
      // Tab strip may be scrolled right (e.g. on Others); snap it back so All Items is visible.
      var pills = document.querySelector(".category-filters-container");
      if (pills) pills.scrollLeft = 0;
    }
    el("logo-home").addEventListener("click", goHome);
    el("logo-home").addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goHome(); } });

    // ── Tap "items selected" to review only the chosen items before sharing ──
    function toggleReview() {
      if (!selectedOnly && totalSelected() === 0) { showToast("Tick some items first!", "info"); return; }
      selectedOnly = !selectedOnly;
      if (selectedOnly) currentFilter = "all";
      render();
      el("list-scroll-area").scrollTop = 0;
    }
    el("selected-summary").addEventListener("click", toggleReview);
    el("selected-summary").addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleReview(); } });

    // ── Search + filter ──
    el("search-input").addEventListener("input", function (e) {
      currentSearch = e.target.value;
      el("search-clear-btn").classList.toggle("hidden", !currentSearch);
      renderGroups();
    });
    el("search-clear-btn").addEventListener("click", function () {
      el("search-input").value = ""; currentSearch = "";
      el("search-clear-btn").classList.add("hidden");
      renderGroups();
    });
    el("add-as-other-btn").addEventListener("click", function () {
      var name = currentSearch.trim();
      if (!name) return;
      addExtraNamed(name);
      // Clear the search so the Other items section (with the new entry) is shown.
      el("search-input").value = ""; currentSearch = "";
      el("search-clear-btn").classList.add("hidden");
      render();
      showToast("Added “" + name + "” to Other items.", "success");
    });
    el("category-filters").addEventListener("click", function (e) {
      var pill = e.target.closest(".filter-pill");
      if (!pill) return;
      var cat = pill.dataset.category;
      selectedOnly = false;
      currentFilter = (cat === "all" || currentFilter === cat) ? "all" : cat;
      render();
    });

    // ── Toasts ──
    function showToast(message, type, actionLabel, actionFn) {
      var c = el("toast-container");
      var t = document.createElement("div");
      t.className = "toast " + (type || "info") + " glass";
      var span = document.createElement("span");
      span.className = "toast-text";
      span.textContent = message;
      t.appendChild(span);
      var timer;
      function dismiss() { t.style.opacity = "0"; t.style.transform = "translateY(-10px) scale(0.95)"; setTimeout(function () { t.remove(); }, 300); }
      if (actionLabel && actionFn) {
        var btn = document.createElement("button");
        btn.className = "toast-action";
        btn.textContent = actionLabel;
        btn.addEventListener("click", function () { clearTimeout(timer); t.remove(); actionFn(); });
        t.appendChild(btn);
      }
      c.appendChild(t);
      timer = setTimeout(dismiss, actionLabel ? 6000 : 2600);
    }
  })();
  </script>
</body>
</html>
